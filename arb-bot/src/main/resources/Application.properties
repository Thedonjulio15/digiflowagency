# ===============================================================
# JARVIS SCANNER - APPLICATION CONFIGURATION
# ===============================================================

# ===============================================================
# LOGGING CONFIGURATION
# ===============================================================
scanner.log.level=DEBUG

# ===============================================================
# SCANNER CONFIGURATION
# ===============================================================

scanner.symbols=BTCUSDT,SOLUSDT,XRPUSDT,LTCUSDT,DOGEUSDT,AVAXUSDT

scanner.threshold.minSpread=0.005

# Per-symbol thresholds (override default if set)
scanner.threshold.btc=0.005
scanner.threshold.sol=0.010
scanner.threshold.xrp=0.008
scanner.threshold.ltc=0.005
scanner.threshold.doge=0.015
scanner.threshold.avax=0.008

# ===============================================================
# PRICE DATA FRESHNESS
# ===============================================================
scanner.dataFreshnessThreshold.ms=10000

# ===============================================================
# POSITION SIZING
# ===============================================================
scanner.notional.usdt=15

# ===============================================================
# SLIPPAGE
# ===============================================================
scanner.slippage.estimate.percent=0.0002

# ===============================================================
# FUNDING RATE
# ===============================================================
scanner.funding.expected.hold.hours=8

# ===============================================================
# TRADING FEES
# ===============================================================
binance.spot.taker.fee=0.001
binance.futures.taker.fee=0.0004

bybit.spot.taker.fee=0.001
bybit.futures.taker.fee=0.00055

# ===============================================================
# TRANSFER FEES (withdrawal cost in the asset, not USD)
# ===============================================================
transfer.fee.BINANCE.USDT=1.0
transfer.fee.BINANCE.BTC=0.0005
transfer.fee.BINANCE.ETH=0.01
transfer.fee.BINANCE.SOL=0.0
transfer.fee.BINANCE.XRP=0.2
transfer.fee.BINANCE.LTC=0.0008
transfer.fee.BINANCE.DOGE=1.0
transfer.fee.BINANCE.AVAX=0.01

transfer.fee.BYBIT.USDT=1.0
transfer.fee.BYBIT.BTC=0.0005
transfer.fee.BYBIT.ETH=0.01
transfer.fee.BYBIT.SOL=0.0
transfer.fee.BYBIT.XRP=0.2
transfer.fee.BYBIT.LTC=0.0008
transfer.fee.BYBIT.DOGE=1.0
transfer.fee.BYBIT.AVAX=0.01

# ===============================================================
# LOGGING OPTIONS
# ===============================================================
scanner.show.nonProfit=false

# ===============================================================
# TRADE EXECUTION CONFIGURATION
# ===============================================================
trade.handler.enabled=true
trade.handler.simulation=false
trade.handler.max.concurrent=1
trade.handler.abort.on.failure=true
trade.handler.threads=4

# ===============================================================
# WITHDRAW NETWORKS (Binance) — used in withdrawal API call
# ===============================================================
withdraw.network.BTC=BTC
withdraw.network.SOL=SOL
withdraw.network.XRP=XRP
withdraw.network.LTC=LTC
withdraw.network.DOGE=DOGE
withdraw.network.AVAX=AVAXC

# ===============================================================
# WITHDRAW CHAINS (Bybit) — used in withdrawal API call
# ===============================================================
withdraw.chain.BTC=BTC
withdraw.chain.SOL=SOL
withdraw.chain.XRP=XRP
withdraw.chain.LTC=LTC
withdraw.chain.DOGE=DOGE
withdraw.chain.AVAX=AVAX

# ===============================================================
# DEPOSIT ADDRESSES
# Fill in YOUR actual deposit addresses from each exchange.
# Do NOT leave these as placeholders when running live.
# ===============================================================

# Binance deposit addresses (where Bybit sends funds TO)
deposit.address.BINANCE.BTC=YOUR_BINANCE_BTC_DEPOSIT_ADDRESS
deposit.address.BINANCE.SOL=YOUR_BINANCE_SOL_DEPOSIT_ADDRESS
deposit.address.BINANCE.XRP=YOUR_BINANCE_XRP_DEPOSIT_ADDRESS
deposit.address.BINANCE.LTC=YOUR_BINANCE_LTC_DEPOSIT_ADDRESS
deposit.address.BINANCE.DOGE=YOUR_BINANCE_DOGE_DEPOSIT_ADDRESS
deposit.address.BINANCE.AVAX=YOUR_BINANCE_AVAX_DEPOSIT_ADDRESS

# Bybit deposit addresses (where Binance sends funds TO)
deposit.address.BYBIT.BTC=YOUR_BYBIT_BTC_DEPOSIT_ADDRESS
deposit.address.BYBIT.SOL=YOUR_BYBIT_SOL_DEPOSIT_ADDRESS
deposit.address.BYBIT.XRP=YOUR_BYBIT_XRP_DEPOSIT_ADDRESS
deposit.address.BYBIT.LTC=YOUR_BYBIT_LTC_DEPOSIT_ADDRESS
deposit.address.BYBIT.DOGE=YOUR_BYBIT_DOGE_DEPOSIT_ADDRESS
deposit.address.BYBIT.AVAX=YOUR_BYBIT_AVAX_DEPOSIT_ADDRESS

# ===============================================================
# DEPOSIT MEMOS (destination tags)
# Required for XRP. Leave blank (or omit) for BTC, SOL, LTC, DOGE, AVAX.
# ===============================================================

# XRP destination tags — get these from each exchange's deposit page
deposit.memo.BINANCE.XRP=YOUR_BINANCE_XRP_DESTINATION_TAG
deposit.memo.BYBIT.XRP=YOUR_BYBIT_XRP_DESTINATION_TAG
